name: CI

on:
  push:
    branches: [main, v5]
  pull_request:
    branches: [main, v5]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run regression tests
      run: |
        python -m pytest tests/test_regression.py -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t oborovo-model:${{ github.sha }} .
    
    - name: Test Docker container
      run: |
        docker run -d --name test-app -p 8501:8501 oborovo-model:${{ github.sha }}
        sleep 5
        docker logs test-app
        docker kill test-app
